apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: erp-app-ingress
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - host: staging.erp.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: erp-app
                port:
                  number: 80