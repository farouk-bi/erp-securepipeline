# zap-rules.conf — Règles de scan personnalisées pour l'ERP
# Format : <rule_id>    IGNORE/WARN/FAIL

# Ignorer les alertes non pertinentes pour une API REST
10015	IGNORE	# Incomplete or No Cache-control Header
10021	IGNORE	# X-Content-Type-Options Missing (déjà géré par Helmet)

# Alertes critiques → FAIL
40012	FAIL	# Cross Site Scripting (Reflected)
40014	FAIL	# Cross Site Scripting (Persistent)
40018	FAIL	# SQL Injection
40019	FAIL	# SQL Injection (MySQL)
40020	FAIL	# SQL Injection (Hypersonic)
40021	FAIL	# SQL Injection (Oracle)
40022	FAIL	# SQL Injection (PostgreSQL)
90021	FAIL	# XPath Injection
90023	FAIL	# XML External Entity Attack

# Alertes moyennes → WARN
10010	WARN	# Cookie No HttpOnly Flag
10011	WARN	# Cookie Without Secure Flag
10054	WARN	# Cookie without SameSite Attribute
40003	WARN	# CRLF Injection